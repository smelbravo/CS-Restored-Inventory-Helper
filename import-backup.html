<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Import settings — CS:Restored Inventory Helper</title>
    <link rel="stylesheet" href="popup.css">
    <style>
        body.import-page {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: var(--bg, #0f1117);
            color: var(--fg, #e8eaed);
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        }
        .import-card {
            width: min(420px, 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--line, #2a2f3a);
            background: var(--surface, #161a22);
        }
        .import-card h1 {
            margin: 0 0 8px;
            font-size: 16px;
        }
        .import-card p {
            margin: 0 0 16px;
            font-size: 12px;
            color: var(--muted, #9aa0a6);
            line-height: 1.5;
        }
        .import-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        #import-page-status {
            margin-top: 12px;
        }
    </style>
</head>
<body class="import-page">
    <div class="import-card">
        <h1 data-i18n="popup.settings.import">Import settings</h1>
        <p data-i18n="popup.settings.importPageHint">Choose a JSON backup exported from this extension. This page stays open while you pick a file.</p>
        <div class="import-actions">
            <button type="button" id="import-page-pick" class="btn btn-sm">
                <span class="btn-tx" data-i18n="popup.settings.importPickFile">Choose file…</span>
            </button>
            <button type="button" id="import-page-close" class="btn btn-sm btn-ghost">
                <span class="btn-tx" data-i18n="popup.settings.importClose">Close</span>
            </button>
        </div>
        <input type="file" id="import-page-file" accept=".json,application/json" hidden>
        <p id="import-page-status" class="settings-backup-status" hidden></p>
    </div>

    <div id="import-modal" class="modal" hidden>
        <div class="modal-card">
            <div class="modal-title" data-i18n="popup.settings.import">Import settings</div>
            <div class="modal-body" data-i18n="popup.settings.importConfirm">Replace your current settings with this backup?</div>
            <div class="modal-actions">
                <button type="button" id="import-cancel" class="btn btn-sm btn-ghost">
                    <span class="btn-tx" data-i18n="popup.settings.importCancel">Cancel</span>
                </button>
                <button type="button" id="import-confirm" class="btn btn-sm">
                    <span class="btn-tx" data-i18n="popup.settings.importConfirmBtn">Import</span>
                </button>
            </div>
        </div>
    </div>

    <script src="csr-storage.js"></script>
    <script src="i18n.js"></script>
    <script src="import-backup.js"></script>
</body>
</html>
