<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS:R Inventory Helper</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header class="hdr">
        <img src="icons/icon-48.png" alt="" width="28" height="28">
        <div>
            <div class="hdr-title">CS:R Helper</div>
            <div class="hdr-sub">Toggle features on csrestored.fun</div>
        </div>
    </header>
    <main id="feature-list" class="feature-list">
        <label class="feature-row" data-key="floatOverlays">
            <input type="checkbox" data-key="floatOverlays" checked>
            <div class="feature-text">
                <div class="feature-label">Float &amp; seed overlays</div>
                <div class="feature-desc">Wear, float, and pattern on item cards</div>
            </div>
        </label>
        <label class="feature-row" data-key="browseFilters">
            <input type="checkbox" data-key="browseFilters" checked>
            <div class="feature-text">
                <div class="feature-label">Search &amp; filters</div>
                <div class="feature-desc">Inventory, marketplace, and create offer</div>
            </div>
        </label>
        <label class="feature-row" data-key="quickSellPanel">
            <input type="checkbox" data-key="quickSellPanel" checked>
            <div class="feature-text">
                <div class="feature-label">Quick Sell &amp; Market</div>
                <div class="feature-desc">Floating panel and confirm sale</div>
            </div>
        </label>
        <label class="feature-row" data-key="caseBulkBuy">
            <input type="checkbox" data-key="caseBulkBuy" checked>
            <div class="feature-text">
                <div class="feature-label">Case bulk buy</div>
                <div class="feature-desc">Buy cases in bulk on /app/inventory/cases</div>
            </div>
        </label>

        <section class="feature-section" id="section-case-auto-open">
            <label class="feature-row feature-row-section" data-key="caseAutoOpen">
                <input type="checkbox" data-key="caseAutoOpen" checked>
                <div class="feature-text">
                    <div class="feature-label">Auto case opening</div>
                    <div class="feature-desc">Auto-open on /app/inventory/cases</div>
                </div>
            </label>
            <div id="case-auto-open-sub" class="feature-sub">
                <div class="sub-title">Auto-sell session drops</div>
                <p class="sub-hint">Only items from the current auto-open run — never your full inventory. Default is manual.</p>

                <label class="sub-row">
                    <input type="radio" name="sellMode" value="manual" checked>
                    <span>Manual only — buttons when finished</span>
                </label>
                <label class="sub-row">
                    <input type="radio" name="sellMode" value="nonGold">
                    <span>Auto: all non-gold (★ kept)</span>
                </label>
                <label class="sub-row">
                    <input type="radio" name="sellMode" value="rarities">
                    <span>Auto: selected rarities only</span>
                </label>

                <div id="sell-rarities" class="rarity-grid" hidden>
                    <label class="rar-row"><input type="checkbox" data-rarity="1"><span>Consumer</span></label>
                    <label class="rar-row"><input type="checkbox" data-rarity="2"><span>Industrial</span></label>
                    <label class="rar-row"><input type="checkbox" data-rarity="3"><span>Mil-Spec</span></label>
                    <label class="rar-row"><input type="checkbox" data-rarity="4"><span>Restricted</span></label>
                    <label class="rar-row"><input type="checkbox" data-rarity="5"><span>Classified</span></label>
                    <label class="rar-row"><input type="checkbox" data-rarity="6"><span>Covert</span></label>
                    <label class="rar-row"><input type="checkbox" data-rarity="7"><span>Contraband</span></label>
                </div>

                <div id="sell-timing-wrap" class="sub-block" hidden>
                    <div class="sub-title sub-title-sm">When to auto-sell</div>
                    <label class="sub-row">
                        <input type="radio" name="sellTiming" value="end" checked>
                        <span>When session ends (less server load)</span>
                    </label>
                    <label class="sub-row">
                        <input type="radio" name="sellTiming" value="each">
                        <span>After each case opens (faster coin recycle)</span>
                    </label>
                </div>

                <div id="sell-batch-wrap" class="sub-block batch-row" hidden>
                    <label for="sell-batch">Auto-sell batch size (1–20)</label>
                    <input type="text" id="sell-batch" inputmode="numeric" autocomplete="off" spellcheck="false" value="5">
                </div>
            </div>
        </section>

        <label class="feature-row" data-key="tradeSearch">
            <input type="checkbox" data-key="tradeSearch" checked>
            <div class="feature-text">
                <div class="feature-label">Trade offer search</div>
                <div class="feature-desc">Search bar in Send Trade Offer modal</div>
            </div>
        </label>
        <label class="feature-row" data-key="skinLock">
            <input type="checkbox" data-key="skinLock" checked>
            <div class="feature-text">
                <div class="feature-label">Skin lock</div>
                <div class="feature-desc">Padlock on inventory cards — blocks extension Quick Sell only</div>
            </div>
        </label>
    </main>
    <footer class="ftr">
        <span id="lock-count" class="lock-count">No locked skins</span>
        <button type="button" id="btn-reset" class="btn-reset">Reset defaults</button>
    </footer>
    <script src="popup.js"></script>
</body>
</html>
